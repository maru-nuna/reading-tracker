<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학습지도">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<title>🌍 나의 학습 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#0f0f14; color:#e8e8f0; min-height:100vh; padding:48px 16px 40px; }
  h1 { text-align:center; font-size:1.4rem; font-weight:700; letter-spacing:-0.02em; margin-bottom:4px; color:#fff; }
  .subtitle { text-align:center; font-size:0.8rem; color:#666; margin-bottom:28px; }
  .container { max-width:480px; margin:0 auto; }
  .sync-status { text-align:center; font-size:0.75rem; color:#555; margin-bottom:12px; height:16px; }
  .sync-status.error { color:#ff6b6b; }
  .chart-wrap { display:flex; justify-content:center; margin-bottom:28px; }
  canvas#radar { width:100%; max-width:340px; height:auto; }
  .card { background:#1a1a24; border:1px solid #2a2a38; border-radius:16px; padding:20px; margin-bottom:20px; }
  .card h2 { font-size:0.85rem; font-weight:600; margin-bottom:16px; color:#aaa; text-transform:uppercase; letter-spacing:0.05em; }

  /* 폼 */
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:0.75rem; color:#888; margin-bottom:6px; }
  .field input, .field select {
    width:100%; background:#0f0f14; border:1px solid #2a2a38; border-radius:8px;
    padding:11px 12px; font-size:0.9rem; font-family:inherit;
    outline:none; transition:border-color 0.2s; text-align:left;
    -webkit-appearance:none; appearance:none; color:#e8e8f0;
  }
  .field input::placeholder { color:#555; }
  .field input:focus, .field select:focus { border-color:#6c63ff; }
  .field input.error, .field select.error { border-color:#a855f7 !important; }
  .field select { color:#555; }
  .field select.has-value { color:#e8e8f0; }
  .field select option { background:#1a1a24; color:#e8e8f0; }
  .field select option[value=""] { color:#555; }
  .select-wrap { position:relative; }
  .select-wrap select { padding-right:36px; }
  .select-wrap::after { content:'▾'; position:absolute; right:13px; top:50%; transform:translateY(-50%); color:#666; font-size:0.9rem; pointer-events:none; }
  .date-wrap { position:relative; }
  .date-wrap input[type="date"] { cursor:pointer; color:transparent; }
  .date-wrap input[type="date"].has-value { color:#e8e8f0; }
  .date-wrap input[type="date"]::-webkit-datetime-edit { color:transparent; }
  .date-wrap input[type="date"].has-value::-webkit-datetime-edit { color:#e8e8f0; }
  .date-wrap input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.5); cursor:pointer; opacity:1; }
  .date-placeholder { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#555; font-size:0.9rem; pointer-events:none; transition:opacity 0.15s; }
  .btn-add { width:100%; padding:13px; background:linear-gradient(135deg,#6c63ff,#a855f7); border:none; border-radius:10px; color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.2s,transform 0.1s; }
  .btn-add:active { transform:scale(0.98); opacity:0.9; }
  .btn-add:disabled { opacity:0.5; }

  /* 분야별 현황 */
  .stat-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .stat-label { width:82px; font-size:0.82rem; white-space:nowrap; flex-shrink:0; }
  .stat-bar-bg { flex:1; height:8px; background:#2a2a38; border-radius:4px; overflow:hidden; }
  .stat-bar-fill { height:100%; border-radius:4px; transition:width 0.5s ease; background:linear-gradient(90deg,#6c63ff,#a855f7); }
  .stat-count { width:28px; text-align:right; font-size:0.82rem; color:#a855f7; font-weight:600; }

  /* 책 목록 */
  .book-item { padding:12px 0; border-bottom:1px solid #2a2a38; }
  .book-item:last-child { border-bottom:none; }
  .book-row { display:flex; align-items:center; justify-content:space-between; gap:10px; cursor:pointer; background:transparent; border-radius:8px; margin:0 -6px; padding:0 6px; transition:background 0.15s; }
  .book-row:active { background:#2a2a38; }
  .book-info { flex:1; min-width:0; }
  .book-title { font-size:0.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .book-meta { display:flex; gap:8px; align-items:center; margin-top:3px; flex-wrap:wrap; }
  .book-cat { font-size:0.75rem; color:#888; }
  .book-date { font-size:0.72rem; color:#555; }
  .book-stars { font-size:0.82rem; margin-top:2px; }
  .book-review { font-size:0.78rem; color:#888; margin-top:4px; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .empty { text-align:center; color:#444; font-size:0.85rem; padding:16px 0; }
  .total-badge { display:inline-block; background:#2a2a38; border-radius:20px; padding:2px 10px; font-size:0.75rem; color:#a855f7; margin-left:8px; font-weight:600; vertical-align:middle; }

  /* 읽을 책 목록 */
  .wish-cat-item { display:flex; align-items:center; justify-content:space-between; padding:11px 6px; border-bottom:1px solid #2a2a38; cursor:pointer; border-radius:8px; margin:0 -6px; transition:background 0.15s; }
  .wish-cat-item:last-child { border-bottom:none; }
  .wish-cat-item:active { background:#2a2a38; }
  .wish-cat-right { display:flex; align-items:center; gap:8px; }
  .wish-cat-count { font-size:0.75rem; color:#a855f7; font-weight:600; }

  /* 오버레이 공통 */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; align-items:flex-end; justify-content:center; }
  .overlay.show { display:flex; }
  .bottom-sheet { background:#1a1a24; border:1px solid #2a2a38; border-radius:20px 20px 0 0; padding:20px 20px 36px; width:100%; max-width:480px; transform:translateY(100%); transition:transform 0.3s ease; }
  .overlay.show .bottom-sheet { transform:translateY(0); }
  .sheet-handle { width:36px; height:4px; background:#3a3a50; border-radius:2px; margin:0 auto 18px; }

  /* 책 상세 바텀시트 */
  .sheet-book-title { font-size:1rem; font-weight:700; margin-bottom:4px; }
  .sheet-book-meta { font-size:0.78rem; color:#666; margin-bottom:18px; }
  .sheet-label { font-size:0.72rem; color:#666; margin-bottom:8px; }
  .stars-input { display:flex; gap:6px; margin-bottom:16px; }
  .star-wrap { position:relative; width:2rem; height:2rem; cursor:pointer; flex-shrink:0; transition:transform 0.1s; }
  .star-wrap:active { transform:scale(1.15); }
  .star-wrap svg { width:100%; height:100%; display:block; }
  .star-half-l { position:absolute; left:0; top:0; width:50%; height:100%; z-index:2; }
  .star-half-r { position:absolute; right:0; top:0; width:50%; height:100%; z-index:2; }
  .review-input { width:100%; background:#0f0f14; border:1px solid #2a2a38; border-radius:8px; padding:10px 12px; color:#e8e8f0; font-size:0.88rem; font-family:inherit; outline:none; resize:none; transition:border-color 0.2s; }
  .review-input:focus { border-color:#6c63ff; }
  .review-input::placeholder { color:#555; }
  .sheet-btns { display:flex; gap:10px; margin-top:14px; }
  .btn-save-review { flex:1; padding:12px; background:linear-gradient(135deg,#6c63ff,#a855f7); border:none; border-radius:10px; color:#fff; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-del-book { padding:12px 16px; background:#2a2a38; border:none; border-radius:10px; color:#ff6b6b; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:inherit; }

  /* 카테고리 바텀시트 */
  .cat-sheet { max-height:70vh; display:flex; flex-direction:column; }
  .cat-sheet-header { flex-shrink:0; margin-bottom:16px; }
  .cat-sheet-name { font-size:1.1rem; font-weight:700; margin-bottom:6px; }
  .cat-sheet-desc { font-size:0.82rem; color:#888; line-height:1.5; }
  .cat-sheet-divider { height:1px; background:#2a2a38; margin-bottom:14px; flex-shrink:0; }
  .cat-book-list { overflow-y:auto; flex:1; }
  .cat-book-item { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid #2a2a38; cursor:pointer; }
  .cat-book-item:last-child { border-bottom:none; }
  .cat-book-name { font-size:0.88rem; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cat-book-info { font-size:0.72rem; color:#555; flex-shrink:0; }
  .cat-book-stars { font-size:0.75rem; }
  .cat-empty { text-align:center; color:#444; font-size:0.85rem; padding:24px 0; }
  .cat-count-badge { display:inline-block; background:#2a2a38; border-radius:20px; padding:2px 10px; font-size:0.72rem; color:#a855f7; margin-left:8px; font-weight:600; vertical-align:middle; }

  /* 위시리스트 바텀시트 */
  .wish-sheet { max-height:85vh; display:flex; flex-direction:column; }
  .wish-sheet-name { font-size:1rem; font-weight:700; margin-bottom:4px; }
  .wish-sheet-desc { font-size:0.78rem; color:#888; margin-bottom:16px; line-height:1.5; }
  .wish-add-box { background:#0f0f14; border:1px solid #2a2a38; border-radius:12px; padding:12px; margin-bottom:14px; flex-shrink:0; }
  .wish-add-row { display:flex; gap:8px; margin-bottom:8px; }
  .wish-add-row:last-child { margin-bottom:0; }
  .wish-input { flex:1; background:#1a1a24; border:1px solid #2a2a38; border-radius:8px; padding:9px 11px; color:#e8e8f0; font-size:0.86rem; font-family:inherit; outline:none; transition:border-color 0.2s; }
  .wish-input:focus { border-color:#6c63ff; }
  .wish-input::placeholder { color:#555; }
  .wish-input.error { border-color:#a855f7; }
  .btn-wish-add { padding:9px 14px; background:linear-gradient(135deg,#6c63ff,#a855f7); border:none; border-radius:8px; color:#fff; font-size:0.86rem; font-weight:600; cursor:pointer; font-family:inherit; white-space:nowrap; }
  .wish-divider { height:1px; background:#2a2a38; margin-bottom:12px; flex-shrink:0; }
  .wish-list { overflow-y:auto; flex:1; }
  .wish-item { display:flex; align-items:flex-start; gap:10px; padding:12px 0; border-bottom:1px solid #2a2a38; }
  .wish-item:last-child { border-bottom:none; }
  .wish-item-check { flex-shrink:0; width:20px; height:20px; margin-top:2px; accent-color:#a855f7; cursor:pointer; display:none; }
  .wish-edit-mode .wish-item-check { display:block; }
  .wish-item-body { flex:1; min-width:0; }
  .wish-item-title { font-size:0.88rem; font-weight:600; margin-bottom:3px; }
  .wish-item-sub { font-size:0.75rem; color:#666; margin-bottom:4px; }
  .wish-item-reason { font-size:0.78rem; color:#888; }
  .wish-item-pencil { flex-shrink:0; background:none; border:none; cursor:pointer; color:#555; font-size:1rem; padding:4px; display:none; transition:color 0.15s; }
  .wish-item-pencil:active { color:#6c63ff; }
  .wish-edit-mode .wish-item-pencil { display:block; }
  .wish-edit-toolbar { display:none; align-items:center; justify-content:space-between; margin-bottom:12px; flex-shrink:0; }
  .wish-edit-mode .wish-edit-toolbar { display:flex; }
  .wish-toolbar-left { display:flex; align-items:center; gap:8px; }
  .wish-select-all { display:flex; align-items:center; gap:6px; font-size:0.8rem; color:#aaa; cursor:pointer; }
  .wish-select-all input { accent-color:#a855f7; width:16px; height:16px; }
  .btn-wish-del-selected { padding:6px 12px; background:#ff6b6b; border:none; border-radius:7px; color:#fff; font-size:0.78rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-wish-del-selected:disabled { opacity:0.4; }
  .wish-edit-box { background:#0f0f14; border:1px solid #2a2a38; border-radius:10px; padding:10px; margin-top:8px; }
  .wish-edit-input { width:100%; background:#1a1a24; border:1px solid #2a2a38; border-radius:7px; padding:8px 10px; color:#e8e8f0; font-size:0.85rem; font-family:inherit; outline:none; margin-bottom:7px; }
  .wish-edit-input:focus { border-color:#6c63ff; }
  .wish-edit-input::placeholder { color:#555; }
  .wish-edit-actions { display:flex; gap:6px; }
  .btn-wish-save { flex:1; padding:8px; background:linear-gradient(135deg,#6c63ff,#a855f7); border:none; border-radius:7px; color:#fff; font-size:0.82rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-wish-cancel { padding:8px 12px; background:#2a2a38; border:none; border-radius:7px; color:#aaa; font-size:0.82rem; cursor:pointer; font-family:inherit; }
  .wish-empty { text-align:center; color:#444; font-size:0.85rem; padding:24px 0; }

  /* 삭제 확인 다이얼로그 */
  .del-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .del-overlay.show { display:flex; }
  .dialog { background:#1a1a24; border:1px solid #2a2a38; border-radius:20px; padding:28px 24px 20px; width:280px; text-align:center; }
  .dialog-title { font-size:1rem; font-weight:700; margin-bottom:8px; }
  .dialog-body { font-size:0.82rem; color:#888; margin-bottom:24px; line-height:1.5; }
  .dialog-btns { display:flex; gap:10px; }
  .dialog-btns button { flex:1; padding:11px; border-radius:10px; border:none; font-size:0.9rem; font-weight:600; cursor:pointer; font-family:inherit; }
  .btn-cancel { background:#2a2a38; color:#aaa; }
  .btn-confirm { background:#ff6b6b; color:#fff; }


  /* 카드 뒤집기 */
  .book-card-label { font-size:0.78rem; color:#888; margin-bottom:14px; text-align:center; }
  .book-card { width:100%; height:160px; perspective:1000px; cursor:pointer; margin:0 auto; }
  .book-card-inner { width:100%; height:100%; position:relative; transform-style:preserve-3d; transition:transform 0.7s cubic-bezier(0.4,0,0.2,1); border-radius:20px; }
  .book-card.flipped .book-card-inner { transform:rotateY(180deg); }
  .book-card-front, .book-card-back { position:absolute; inset:0; border-radius:20px; display:flex; align-items:center; justify-content:center; backface-visibility:hidden; -webkit-backface-visibility:hidden; flex-direction:column; padding:16px; }
  .book-card-front { background:#1a1a24; font-size:3.2rem; gap:8px; animation:cardGlow 1.8s ease-in-out infinite; }
  @keyframes cardGlow {
    0%, 100% { box-shadow:0 0 20px rgba(108,99,255,0.6), 0 0 50px rgba(168,85,247,0.3), 0 0 80px rgba(108,99,255,0.1); }
    50% { box-shadow:0 0 35px rgba(168,85,247,0.9), 0 0 70px rgba(108,99,255,0.5), 0 0 110px rgba(168,85,247,0.2); }
  }
  .book-card.flipped .book-card-front { animation:none; box-shadow:none; }
  .book-card-back { background:#1a1a24; box-shadow:0 8px 32px rgba(0,0,0,0.5); transform:rotateY(180deg); font-size:0.92rem; font-weight:600; color:#e8e8f0; text-align:center; line-height:1.5; gap:6px; }
  .book-card-back .card-no-wish { font-size:0.82rem; color:#555; font-weight:400; }
  .roulette-hint { display:flex; align-items:center; gap:8px; margin-bottom:10px; cursor:pointer; width:fit-content; }
  .roulette-hint-icon { width:22px; height:22px; border-radius:50%; border:1.5px solid #6c63ff; display:flex; align-items:center; justify-content:center; color:#6c63ff; font-size:0.78rem; font-weight:700; flex-shrink:0; }
  .roulette-hint-text { font-size:0.8rem; color:#6c63ff; text-decoration:underline; text-underline-offset:2px; }

  /* 룰렛 오버레이 */
  .roulette-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:300; align-items:center; justify-content:center; }
  .roulette-overlay.show { display:flex; }
  .roulette-box { background:#1a1a24; border:1px solid #2a2a38; border-radius:24px; padding:28px 24px 24px; width:min(340px, 92vw); text-align:center; }
  .roulette-title { font-size:1rem; font-weight:700; margin-bottom:4px; }
  .roulette-sub { font-size:0.78rem; color:#666; margin-bottom:24px; }
  .roulette-wheel-wrap { position:relative; margin:0 auto 24px; width:220px; height:220px; }
  .roulette-canvas { border-radius:50%; }
  .roulette-needle { position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-size:1.4rem; line-height:1; z-index:10; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
  .roulette-result { font-size:1.1rem; font-weight:700; color:#e8e8f0; min-height:28px; margin-bottom:20px; }
  .roulette-btns { display:flex; gap:10px; }
  .btn-spin { flex:1; padding:12px; background:linear-gradient(135deg,#6c63ff,#a855f7); border:none; border-radius:10px; color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.2s; }
  .btn-spin:disabled { opacity:0.5; }
  .btn-roulette-close { padding:12px 16px; background:#2a2a38; border:none; border-radius:10px; color:#aaa; font-size:0.9rem; cursor:pointer; font-family:inherit; }

  /* 정렬 버튼 */
  .sort-btn { padding:4px 10px; border-radius:20px; border:1px solid #2a2a38; background:none; color:#666; font-size:0.72rem; cursor:pointer; font-family:inherit; transition:all 0.15s; white-space:nowrap; }
  .sort-btn.active { background:#6c63ff; border-color:#6c63ff; color:#fff; }
  .toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%) translateY(20px); background:#2a2a38; color:#e8e8f0; padding:10px 20px; border-radius:20px; font-size:0.85rem; opacity:0; transition:all 0.3s; pointer-events:none; white-space:nowrap; z-index:999; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">
  <h1>🌍 나의 학습 지도</h1>
  <p class="subtitle">나는 균형잡힌 학습을 하고 있나요?</p>
  <div id="syncStatus" class="sync-status"></div>

  <div class="chart-wrap"><canvas id="radar" width="340" height="340"></canvas></div>

  <div class="roulette-hint" onclick="openRoulette()">
    <div class="roulette-hint-icon">!</div>
    <span class="roulette-hint-text">무슨 책을 읽을지 고민 된다면?</span>
  </div>
  <div class="card">
    <h2>✏️ 읽은 책 등록</h2>
    <div class="field">
      <label>책 제목 <span style="color:#a855f7;">*</span></label>
      <input type="text" id="bookTitle" placeholder="책 제목 입력">
    </div>
    <div class="field">
      <label>분야 <span style="color:#a855f7;">*</span></label>
      <div class="select-wrap">
        <select id="bookCat" onchange="onCatChange(this)">
          <option value="">분야 선택</option>
          <option value="경제">💰 경제</option>
          <option value="육아">👶 육아</option>
          <option value="철학">🧠 철학</option>
          <option value="예술">🎨 예술</option>
          <option value="역사">📜 역사</option>
          <option value="문화">🌍 문화</option>
          <option value="과학">🔬 과학</option>
          <option value="심리">💖 심리</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>완독일</label>
      <div class="date-wrap">
        <input type="date" id="bookDate">
        <span class="date-placeholder" id="datePlaceholder">날짜 선택</span>
      </div>
    </div>
    <div class="field">
      <label>별점</label>
      <div class="stars-input" id="addStars" style="margin-bottom:0;"></div>
    </div>
    <div class="field">
      <label>내가 몰랐던 것 <span style="color:#a855f7;">*</span></label>
      <textarea class="review-input" id="addReview" rows="2" placeholder="이 책을 읽고 알게된 내가 몰랐던 것"></textarea>
    </div>
    <button class="btn-add" id="addBtn" onclick="addBook()">+ 등록하기</button>
  </div>

  <div class="card">
    <h2>📊 분야별 현황 <span class="total-badge" id="totalBadge" onclick="openAllBooksSheet()" style="cursor:pointer;">0권 ›</span></h2>
    <div id="statsList"></div>
  </div>

  <div class="card">

      <button class="btn-confirm" onclick="doDelete()">삭제</button>

</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx8z5UwPTw0uO07WuCkICAzC7hLSQ4X8EjYqrY8K39ZGE7Pnn7jcjPAvJkydTQM93aTmQ/exec';

const CATEGORIES = [
  { key:'경제', label:'💰 경제', desc:'돈으로부터 자유로워지기 위한 구조를 배운다' },
  { key:'육아', label:'👶 육아', desc:'흔들리지 않는 행복한 엄마가 되는 방법을 배운다' },
  { key:'철학', label:'🧠 철학', desc:'나의 기준을 어떻게 세울지 배운다' },
  { key:'예술', label:'🎨 예술', desc:'아는 만큼 보이는 힘을 기른다' },
  { key:'역사', label:'📜 역사', desc:'반복되는 패턴과 변수에 대응하는 지혜를 배운다' },
  { key:'문화', label:'🌍 문화', desc:'다름을 배운다' },
  { key:'과학', label:'🔬 과학', desc:'세상이 실제로 어떻게 작동하는지 배운다' },
  { key:'심리', label:'💖 심리', desc:'왜 그렇게 행동하는지 이해하는 방법을 배운다' },
];

let books = [];
let wishlist = [];
let sheetBookId = null;
let editingWishId = null;
let wishCatKey = null;

function loadReviews() { try { return JSON.parse(localStorage.getItem('reviews') || '{}'); } catch { return {}; } }
function saveReviews(r) { localStorage.setItem('reviews', JSON.stringify(r)); }

// ── 날짜 placeholder ──
const bookDateEl = document.getElementById('bookDate');
const datePlaceholderEl = document.getElementById('datePlaceholder');
bookDateEl.addEventListener('change', () => {
  if (bookDateEl.value) { bookDateEl.classList.add('has-value'); datePlaceholderEl.style.opacity='0'; }
  else { bookDateEl.classList.remove('has-value'); datePlaceholderEl.style.opacity='1'; }
});
bookDateEl.addEventListener('focus', () => { datePlaceholderEl.style.opacity='0'; });
bookDateEl.addEventListener('blur', () => { if (!bookDateEl.value) datePlaceholderEl.style.opacity='1'; });

function onCatChange(el) { el.classList.toggle('has-value', !!el.value); el.classList.remove('error'); }

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + (dateStr.length===10?'T00:00:00':''));
  if (isNaN(d)) return '';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setSyncStatus(msg, type) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  el.className = 'sync-status' + (type ? ' '+type : '');
}

// ── 책 상세 바텀시트 ──
function openSheet(bookId) {
  sheetBookId = bookId;
  const b = books.find(b => String(b.id) === String(bookId));
  if (!b) return;
  const cat = CATEGORIES.find(c => c.key === b.cat);
  const rv = (loadReviews())[bookId] || {};
  document.getElementById('sheetTitle').textContent = b.title;
  document.getElementById('sheetMeta').textContent = `${cat?cat.label:b.cat}${b.date?' · '+formatDate(b.date):''}`;
  document.getElementById('sheetReview').value = rv.text || '';
  renderSheetStars(rv.rating || 0);
  document.getElementById('sheetOverlay').classList.add('show');
}
function closeSheet() { document.getElementById('sheetOverlay').classList.remove('show'); sheetBookId = null; }
document.getElementById('sheetOverlay').addEventListener('click', function(e) { if(e.target===this) closeSheet(); });

const STAR_PATH = 'M16 2.5l3.09 6.26L26 9.77l-5 4.87 1.18 6.86L16 18.27l-6.18 3.23L11 14.64 6 9.77l6.91-1.01z';
function starSVG(fill) {
  // fill: 0(빈) ~ 1(꽉참), 0.5=반개
  const clipW = Math.round(fill * 32);
  const id = 'sc' + Math.random().toString(36).slice(2,7);
  return `<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
    <defs><clipPath id="${id}"><rect x="0" y="0" width="${clipW}" height="32"/></clipPath></defs>
    <path d="${STAR_PATH}" fill="#2e2e42" stroke="#3a3a58" stroke-width="1"/>
    <path d="${STAR_PATH}" fill="#f5c518" clip-path="url(#${id})"/>
  </svg>`;
}
function renderStarsTo(containerId, rating, onSet) {
  const el = document.getElementById(containerId);
  if (!el) return;
  el.innerHTML = [1,2,3,4,5].map(i => {
    const fill = Math.min(Math.max(rating - (i-1), 0), 1);
    return `<div class="star-wrap">
      ${starSVG(fill)}
      <span class="star-half-l" onclick="${onSet}(${i-0.5})"></span>
      <span class="star-half-r" onclick="${onSet}(${i})"></span>
    </div>`;
  }).join('');
}
function renderSheetStars(rating) { renderStarsTo('sheetStars', rating, 'setSheetStar'); }
function setSheetStar(rating) {
  const reviews = loadReviews();
  if (!reviews[sheetBookId]) reviews[sheetBookId] = {};
  reviews[sheetBookId].rating = rating;
  saveReviews(reviews); renderSheetStars(rating); render();
}
function saveReview() {
  const text = document.getElementById('sheetReview').value.trim();
  const reviews = loadReviews();
  if (!reviews[sheetBookId]) reviews[sheetBookId] = {};
  reviews[sheetBookId].text = text;
  saveReviews(reviews); render(); showToast('✅ 저장됐어요!'); closeSheet();
}

// ── 삭제 확인 ──
function askDelete() {
  const b = books.find(b => String(b.id) === String(sheetBookId));
  if (!b) return;
  document.getElementById('dialogBody').innerHTML = `"${b.title}"을(를)<br>정말 삭제하시겠어요?`;
  document.getElementById('delOverlay').classList.add('show');
}
function closeDelDialog() { document.getElementById('delOverlay').classList.remove('show'); }
async function doDelete() {
  closeDelDialog();
  const id = sheetBookId;
  closeSheet();
  try {
    await fetch(API, { method:'POST', body:JSON.stringify({ action:'delete', id }) });
    books = books.filter(b => String(b.id) !== String(id));
    render();
    showToast('🗑 삭제됐어요');
    const res = await fetch(API);
    const data = await res.json();
    books = data.books || [];
    wishlist = data.wishlist || [];
    render();
  } catch(e) { showToast('삭제 실패. 다시 시도해주세요.'); }
}


// ── 전체 책 바텀시트 ──
let allBooksSortMode = 'recent'; // 'recent' | 분야 key

function openAllBooksSheet() {
  allBooksSortMode = 'recent';
  renderAllBooksSheet();
  document.getElementById('allBooksOverlay').classList.add('show');
}

function renderAllBooksSheet() {
  const reviews = loadReviews();
  document.getElementById('allBooksTitle').innerHTML = `📖 전체 책 <span class="cat-count-badge">${books.length}권</span>`;

  // 정렬 버튼
  const sortBtns = [{ key:'recent', label:'등록순' }, { key:'cat', label:'분야순' }];
  document.getElementById('allBooksSortBtns').innerHTML = sortBtns.map(s =>
    `<button class="sort-btn ${allBooksSortMode===s.key?'active':''}" onclick="setAllBooksSort('${s.key}')">${s.label}</button>`
  ).join('');

  let sorted = allBooksSortMode === 'cat'
    ? [...books].sort((a,b) => CATEGORIES.findIndex(c=>c.key===a.cat) - CATEGORIES.findIndex(c=>c.key===b.cat))
    : [...books].reverse();

  const listEl = document.getElementById('allBooksList');
  if (!sorted.length) {
    listEl.innerHTML = '<p class="cat-empty">해당 분야의 책이 없어요</p>';
  } else {
    listEl.innerHTML = sorted.map(b => {
      const cat = CATEGORIES.find(c => c.key === b.cat);
      const rv = reviews[b.id] || {};
      const rating = rv.rating || 0;
      return `<div class="cat-book-item" onclick="closeAllBooksSheet();setTimeout(()=>openSheet(${b.id}),200)">
        <div style="flex:1;min-width:0;">
          <div class="cat-book-name">${b.title}</div>
          <div style="display:flex;gap:8px;margin-top:3px;align-items:center;flex-wrap:wrap;">
            ${cat?`<span class="cat-book-info">${cat.label}</span>`:''}
            ${b.date?`<span class="cat-book-info">${formatDate(b.date)}</span>`:''}
            ${rating>0?`<span class="cat-book-stars">${formatRating(rating)}</span>`:''}
          </div>
        </div>
        <span style="color:#6c63ff;font-size:1rem;font-weight:600;">›</span>
      </div>`;
    }).join('');
  }
}

function setAllBooksSort(key) {
  allBooksSortMode = key;
  renderAllBooksSheet();
}

function closeAllBooksSheet() {
  document.getElementById('allBooksOverlay').classList.remove('show');
}

document.getElementById('allBooksOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAllBooksSheet();
});

// ── 카테고리 바텀시트 ──
function openCatSheet(catKey) {
  const cat = CATEGORIES.find(c => c.key === catKey);
  if (!cat) return;
  const reviews = loadReviews();
  const catBooks = books.filter(b => b.cat === catKey);
  document.getElementById('catSheetName').innerHTML = `${cat.label} <span class="cat-count-badge">${catBooks.length}권</span>`;
  document.getElementById('catSheetDesc').textContent = cat.desc;
  const listEl = document.getElementById('catBookList');
  if (!catBooks.length) {
    listEl.innerHTML = '<p class="cat-empty">아직 등록된 책이 없어요</p>';
  } else {
    listEl.innerHTML = [...catBooks].reverse().map(b => {
      const rv = reviews[b.id] || {};
      const rating = rv.rating || 0;
      return `<div class="cat-book-item" onclick="closeCatSheet();setTimeout(()=>openSheet(${b.id}),200)">
        <div style="flex:1;min-width:0;">
          <div class="cat-book-name">${b.title}</div>
          <div style="display:flex;gap:8px;margin-top:3px;align-items:center;">
            ${b.date?`<span class="cat-book-info">${formatDate(b.date)}</span>`:''}
            ${rating>0?`<span class="cat-book-stars">${formatRating(rating)}</span>`:''}
          </div>
        </div>
        <span style="color:#6c63ff;font-size:1rem;font-weight:600;">›</span>
      </div>`;
    }).join('');
  }
  document.getElementById('catOverlay').classList.add('show');
}
function closeCatSheet() { document.getElementById('catOverlay').classList.remove('show'); }
document.getElementById('catOverlay').addEventListener('click', function(e) { if(e.target===this) closeCatSheet(); });


// ── 전체 위시리스트 바텀시트 ──
let allWishSortMode = 'recent';

function openAllWishSheet() {
  allWishSortMode = 'recent';
  renderAllWishSheet();
  document.getElementById('allWishOverlay').classList.add('show');
}

function renderAllWishSheet() {
  document.getElementById('allWishTitle').innerHTML = `🔖 읽고 싶은 책 <span class="cat-count-badge">${wishlist.length}권</span>`;

  const sortBtns = [{ key:'recent', label:'등록순' }, { key:'cat', label:'분야순' }];
  document.getElementById('allWishSortBtns').innerHTML = sortBtns.map(s =>
    `<button class="sort-btn ${allWishSortMode===s.key?'active':''}" onclick="setAllWishSort('${s.key}')">${s.label}</button>`
  ).join('');

  const sorted = allWishSortMode === 'cat'
    ? [...wishlist].sort((a,b) => CATEGORIES.findIndex(c=>c.key===a.cat) - CATEGORIES.findIndex(c=>c.key===b.cat))
    : [...wishlist].reverse();

  const listEl = document.getElementById('allWishList');
  if (!sorted.length) {
    listEl.innerHTML = '<p class="cat-empty">해당 분야의 책이 없어요</p>';
  } else {
    listEl.innerHTML = sorted.map(w => {
      const cat = CATEGORIES.find(c => c.key === w.cat);
      return `<div class="cat-book-item" style="align-items:flex-start;gap:12px;">
        <div style="flex-shrink:0;padding-top:2px;">
          <span style="font-size:1.1rem;">${cat?cat.label.split(' ')[0]:'📚'}</span>
        </div>
        <div style="flex:1;min-width:0;">
          <div class="cat-book-name">${w.title}</div>
          ${w.author?`<div style="font-size:0.75rem;color:#7a7a9a;margin-top:3px;">${w.author}</div>`:''}
          ${w.reason?`<div style="font-size:0.78rem;color:#8888aa;margin-top:4px;">"${w.reason}"</div>`:''}
        </div>
      </div>`;
    }).join('');
  }
}

function setAllWishSort(key) {
  allWishSortMode = key;
  renderAllWishSheet();
}

function closeAllWishSheet() {
  document.getElementById('allWishOverlay').classList.remove('show');
}

document.getElementById('allWishOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeAllWishSheet();
});

function openAddWishSheet() {
  document.getElementById('addWishInputTitle').value = '';
  document.getElementById('addWishInputAuthor').value = '';
  document.getElementById('addWishInputReason').value = '';
  const catEl = document.getElementById('addWishCat');
  catEl.value = ''; catEl.classList.remove('has-value');
  document.getElementById('addWishOverlay').classList.add('show');
}
function closeAddWishSheet() {
  document.getElementById('addWishOverlay').classList.remove('show');
}
document.getElementById('addWishOverlay').addEventListener('click', function(e) { if(e.target===this) closeAddWishSheet(); });

async function addWishFromSheet() {
  const titleEl = document.getElementById('addWishInputTitle');
  const catEl = document.getElementById('addWishCat');
  const reasonEl = document.getElementById('addWishInputReason');
  const title = titleEl.value.trim();
  const cat = catEl.value;
  const author = document.getElementById('addWishInputAuthor').value.trim();
  const reason = reasonEl.value.trim();
  titleEl.classList.remove('error'); catEl.classList.remove('error'); reasonEl.classList.remove('error');
  let hasError = false;
  if (!title) { titleEl.classList.add('error'); hasError = true; }
  if (!cat) { catEl.style.borderColor='#a855f7'; hasError = true; }
  if (!reason) { reasonEl.classList.add('error'); hasError = true; }
  if (hasError) { showToast('필수 항목을 입력해 주세요'); return; }
  catEl.style.borderColor = '';
  const newWish = { id: String(Date.now()), title, author, reason, cat };
  try {
    await fetch(API, { method:'POST', body:JSON.stringify({ action:'wish_add', ...newWish }) });
    wishlist.push(newWish);
    renderWishCats();
    closeAddWishSheet();
    showToast('✅ 추가됐어요!');
  } catch(e) { showToast('추가 실패. 다시 시도해주세요.'); }
}

  wishCatKey = catKey;

  wishEditMode = false;

  editBtn.textContent = '편집';
  editBtn.style.color = '';
  editBtn.style.borderColor = '';

function closeWishSheet() {

}
document.getElementById('wishOverlay').addEventListener('click', function(e) { if(e.target===this) closeWishSheet(); });

function toggleSelectAll(checked) {

}

function updateDelBtn() {

  document.getElementById('btnDelSelected').disabled = !any;
}

async function deleteSelectedWishes() {
  const checked = [...document.querySelectorAll('.wish-item-check:checked')].map(cb => cb.dataset.id);
  if (!checked.length) return;
  try {
    for (const id of checked) {
      await fetch(API, { method:'POST', body:JSON.stringify({ action:'wish_delete', id }) });
      wishlist = wishlist.filter(w => w.id !== id);
    }

function renderWishList() {
  const catWishes = wishlist.filter(w => w.cat === wishCatKey);
  const el = document.getElementById('wishList');
  if (!catWishes.length) { el.innerHTML = '<p class="wish-empty">아직 추가된 책이 없어요</p>'; return; }

    if (editingWishId === w.id) {

        <div class="wish-edit-box">
          <input class="wish-edit-input" id="edit-title-${w.id}" value="${w.title.replace(/"/g,'&quot;')}" placeholder="책 제목 (필수)">
          <input class="wish-edit-input" id="edit-author-${w.id}" value="${(w.author||'').replace(/"/g,'&quot;')}" placeholder="저자 (선택)">
          <input class="wish-edit-input" id="edit-reason-${w.id}" value="${(w.reason||'').replace(/"/g,'&quot;')}" placeholder="읽고 싶은 이유 (필수)" style="margin-bottom:0">
          <div class="wish-edit-actions" style="margin-top:8px;">
            <button class="btn-wish-save" onclick="saveWishEdit('${w.id}')">저장</button>
            <button class="btn-wish-cancel" onclick="editingWishId=null;renderWishList()">취소</button>

        <div class="wish-item-title">${w.title}</div>

// ── 룰렛 ──
const ROULETTE_COLORS = [
  '#6c63ff','#a855f7','#7c3aed','#9333ea',
  '#8b5cf6','#c084fc','#7e22ce','#a78bfa'
];

let isSpinning = false;
let currentAngle = 0;

function flipCard() {
  const card = document.getElementById('bookCard');
  if (card.classList.contains('flipped')) return;
  const catKey = document.getElementById('bookCardBack').dataset.cat;

  }
  card.classList.add('flipped');
}

function openRoulette() {
  document.getElementById('rouletteResult').textContent = '';
  document.getElementById('btnSpin').disabled = false;
  document.getElementById('bookCardWrap').style.display = 'none';
  document.getElementById('bookCard').classList.remove('flipped');
  document.getElementById('rouletteOverlay').classList.add('show');
  drawWheel(currentAngle);
}

function closeRoulette() {
  document.getElementById('rouletteOverlay').classList.remove('show');
}

document.getElementById('rouletteOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeRoulette();
});

function drawWheel(rotation) {
  const canvas = document.getElementById('rouletteCanvas');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 220;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);
  const W = size, H = size;
  const cx = W/2, cy = H/2, r = cx - 4;
  const n = CATEGORIES.length;
  const slice = (Math.PI * 2) / n;
  ctx.clearRect(0, 0, W, H);

  CATEGORIES.forEach((cat, i) => {
    const start = rotation + i * slice;
    const end = start + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = ROULETTE_COLORS[i % ROULETTE_COLORS.length];
    ctx.fill();
    ctx.strokeStyle = '#0f0f14';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + slice / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 11px Apple SD Gothic Neo, sans-serif';
    ctx.fillText(cat.label, r - 8, 4);
    ctx.restore();
  });

  ctx.beginPath();
  ctx.arc(cx, cy, 18, 0, Math.PI * 2);
  ctx.fillStyle = '#0f0f14';
  ctx.fill();
  ctx.strokeStyle = '#2a2a38';
  ctx.lineWidth = 2;
  ctx.stroke();
}

function spinRoulette() {
  if (isSpinning) return;
  isSpinning = true;
  document.getElementById('btnSpin').disabled = true;
  document.getElementById('rouletteResult').textContent = '';

  const n = CATEGORIES.length;
  const slice = (Math.PI * 2) / n;
  const winIndex = Math.floor(Math.random() * n);
  // 당첨 조각 중앙이 바늘(12시, -π/2)에 정확히 오도록
  // finalAngle + winIndex*slice + slice/2 ≡ -π/2 (mod 2π)
  const needed = -Math.PI/2 - winIndex * slice - slice/2;
  const extraSpins = Math.PI * 2 * (6 + Math.floor(Math.random() * 3));
  const finalAngle = needed + extraSpins;

  const duration = 4000;
  const start = performance.now();
  const startAngle = currentAngle;
  const endAngle = startAngle + (finalAngle - (startAngle % (Math.PI*2)));

  function animate(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 4);
    currentAngle = startAngle + (endAngle - startAngle) * ease;
    drawWheel(currentAngle);
    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = endAngle;
      isSpinning = false;
      document.getElementById('btnSpin').disabled = false;
      const normalized = ((currentAngle % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
      const needleAngle = (Math.PI*2 - (-Math.PI/2 - normalized) % (Math.PI*2) + Math.PI*2) % (Math.PI*2);
      const result = Math.floor(((Math.PI/2 - (currentAngle % (Math.PI*2)) % (Math.PI*2) + Math.PI*4) % (Math.PI*2)) / (Math.PI*2/n)) % n;
      const cat = CATEGORIES[winIndex];
      document.getElementById('rouletteResult').textContent = `${cat.label} 분야를 읽어봐요!`;
      // 해당 분야 위시리스트 있을 때만 카드 표시
      const wishes = wishlist.filter(w => w.cat === cat.key);
      const cardWrap = document.getElementById('bookCardWrap');
      if (wishes.length > 0) {
        const card = document.getElementById('bookCard');
        const cardBack = document.getElementById('bookCardBack');
        card.classList.remove('flipped');
        cardBack.innerHTML = '';
        cardBack.dataset.cat = cat.key;
        cardWrap.style.display = 'block';
      } else {
        cardWrap.style.display = 'none';
      }
    }
  }
  requestAnimationFrame(animate);
}

function formatRating(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5;
  return '⭐'.repeat(full) + (half ? '✨' : '');
}
let addStarRating = 0;
function setAddStar(rating) {
  addStarRating = rating;
  renderStarsTo('addStars', rating, 'setAddStar');
}

  const titleEl = document.getElementById('bookTitle');
  const catEl = document.getElementById('bookCat');

  const title = titleEl.value.trim();
  const cat = catEl.value;

  titleEl.classList.remove('error'); catEl.classList.remove('error'); reviewEl.classList.remove('error');

  if (!cat) { catEl.classList.add('error'); hasError = true; }

  const btn = document.getElementById('addBtn');

    }

  } catch(e) { showToast('저장 실패. 다시 시도해주세요.'); }

}

function getCounts() {
  const counts = {};
  CATEGORIES.forEach(c => counts[c.key] = 0);
  books.forEach(b => { if(counts[b.cat]!==undefined) counts[b.cat]++; });
  return counts;
}

function render() {
  const counts = getCounts();
  const reviews = loadReviews();
  document.getElementById('totalBadge').textContent = books.length + '권 ›';
  const max = Math.max(...Object.values(counts), 1);

  document.getElementById('statsList').innerHTML = CATEGORIES.map(c => `
    <div class="stat-row" onclick="openCatSheet('${c.key}')" style="cursor:pointer;margin:0 -6px;padding:4px 6px;border-radius:8px;" ontouchstart="this.style.background='#2a2a38'" ontouchend="this.style.background=''">
      <span class="stat-label">${c.label} <span style="color:#6c63ff;font-size:0.85rem;font-weight:600;">›</span></span>
      <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${counts[c.key]===0?'2%':(counts[c.key]/max)*100+'%'}"></div></div>
      <span class="stat-count">${counts[c.key]}</span>
    </div>`).join('');

  renderWishCats();
  drawRadar(counts);
}

function drawRadar(counts) {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const size = 340;
  canvas.width = size * dpr;
  canvas.height = size * dpr;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(dpr, dpr);
  const W = size, H = size;
  ctx.clearRect(0,0,W,H);
  const cx=W/2, cy=H/2, maxR=Math.min(W,H)*0.36, n=CATEGORIES.length;
  const vals=CATEGORIES.map(c=>counts[c.key]), maxVal=Math.max(...vals,5);
  const angle=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(i,r)=>({x:cx+r*Math.cos(angle(i)),y:cy+r*Math.sin(angle(i))});
  for(let g=1;g<=4;g++){
    const r=maxR*g/4; ctx.beginPath();
    for(let i=0;i<n;i++){const p=pt(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
    ctx.closePath(); ctx.strokeStyle=g===4?'#3a3a50':'#2a2a38'; ctx.lineWidth=1; ctx.stroke();
  }
  for(let i=0;i<n;i++){const p=pt(i,maxR);ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(p.x,p.y);ctx.strokeStyle='#2a2a38';ctx.lineWidth=1;ctx.stroke();}
  ctx.beginPath();
  for(let i=0;i<n;i++){const r=(vals[i]/maxVal)*maxR,p=pt(i,r);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
  ctx.closePath();
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,maxR);
  grad.addColorStop(0,'rgba(168,85,247,0.5)'); grad.addColorStop(1,'rgba(108,99,255,0.2)');
  ctx.fillStyle=grad; ctx.fill(); ctx.strokeStyle='#a855f7'; ctx.lineWidth=2; ctx.stroke();
  for(let i=0;i<n;i++){const r=(vals[i]/maxVal)*maxR,p=pt(i,r);ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#a855f7';ctx.lineWidth=2;ctx.stroke();}
  const labelR=maxR+28; ctx.textAlign='center'; ctx.textBaseline='middle';
  CATEGORIES.forEach((c,i)=>{
    const p=pt(i,labelR),[emoji,name]=c.label.split(' ');
    ctx.font='bold 14px Apple SD Gothic Neo,sans-serif'; ctx.fillStyle='#e8e8f0'; ctx.fillText(emoji,p.x,p.y-7);
    ctx.font='11px Apple SD Gothic Neo,sans-serif'; ctx.fillStyle='#888'; ctx.fillText(name,p.x,p.y+8);
  });
}
